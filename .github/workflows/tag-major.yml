name: tag-major

# On every full semver release (vX.Y.Z), advance the moving major and minor
# tags (e.g. v0 and v0.2) to the same commit, so consumers of the GitHub Action
# can pin `uses: Martinez1991/quorum-sec-scan@v0` and always get the latest
# release. Closes the manual step previously needed after each release.
#
# These moving tags do NOT re-trigger this workflow or release.yml: both are
# scoped to full-semver tags only, and pushes made with GITHUB_TOKEN do not
# trigger further workflow runs.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  move:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Advance major/minor tags
        env:
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          major="${REF_NAME%%.*}"   # v0.2.5 -> v0
          minor="${REF_NAME%.*}"    # v0.2.5 -> v0.2
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for t in "$major" "$minor"; do
            echo "Pointing $t -> $REF_NAME ($SHA)"
            git tag -f -a "$t" -m "Latest release: $REF_NAME" "$SHA"
            git push -f origin "$t"
          done
