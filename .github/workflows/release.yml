name: release

# Builds and publishes the Quorum Docker images to GitHub Container Registry
# (ghcr.io) on every `v*` tag, and on manual dispatch.
#
#   :full / :<version> / :latest   → all scanners bundled (self-contained CI image)
#   :slim / :<version>-slim        → orchestrator only (bring your own scanners)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to tag the images with (e.g. 0.1.0)"
        required: true
        default: "dev"

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: full
            dockerfile: Dockerfile.full
          - variant: slim
            dockerfile: Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version and image name
        id: meta
        run: |
          set -euo pipefail
          # Lowercase owner/repo for GHCR.
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${{ github.event.inputs.version }}"
          fi
          echo "image=$image"     >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

          # Build the newline-separated tag list for this variant.
          {
            echo "tags<<EOF"
            if [ "${{ matrix.variant }}" = "full" ]; then
              printf '%s\n' "$image:full" "$image:$version" "$image:$version-full" "$image:latest"
            else
              printf '%s\n' "$image:slim" "$image:$version-slim"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.variant }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          # The :full image pulls linux/amd64-specific scanner binaries, so we
          # publish amd64 only to keep both variants consistent.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=quorum-${{ matrix.variant }}
          cache-to: type=gha,scope=quorum-${{ matrix.variant }},mode=max

      - name: Summary
        run: |
          {
            echo "### Published \`${{ matrix.variant }}\` image"
            echo ""
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
