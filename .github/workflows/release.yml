name: release

# Builds, publishes and signs the Quorum Docker images on GitHub Container
# Registry (ghcr.io) on every `v*` tag, and on manual dispatch.
#
#   :full / :<version> / :latest   → all scanners bundled (linux/amd64 only,
#                                    the bundled scanner binaries are amd64)
#   :slim / :<version>-slim        → orchestrator only (linux/amd64 + linux/arm64)
#
# Images are signed keylessly with cosign via the GitHub OIDC identity (no keys
# to manage). Verify with:
#
#   cosign verify ghcr.io/<owner>/quorum-sec-scan:slim \
#     --certificate-identity-regexp \
#       "https://github.com/<owner>/quorum-sec-scan/.github/workflows/release.yml@.*" \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com

on:
  push:
    tags:
      # Only full semver releases (vX.Y.Z). Moving major tags like `v0`, used to
      # pin the GitHub Action, must NOT trigger a release build.
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to tag the images with (e.g. 0.1.0)"
        required: true
        default: "dev"

permissions:
  contents: read
  packages: write
  id-token: write # required for cosign keyless signing (Sigstore OIDC)
  attestations: write # required for SLSA build-provenance attestations

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: full
            dockerfile: Dockerfile.full
            platforms: linux/amd64
          - variant: slim
            dockerfile: Dockerfile
            platforms: linux/amd64,linux/arm64
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version and image name
        id: meta
        run: |
          set -euo pipefail
          # Lowercase owner/repo for GHCR.
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${{ github.event.inputs.version }}"
          fi
          echo "image=$image"     >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

          # Build the newline-separated tag list for this variant.
          {
            echo "tags<<EOF"
            if [ "${{ matrix.variant }}" = "full" ]; then
              printf '%s\n' "$image:full" "$image:$version" "$image:$version-full" "$image:latest"
            else
              printf '%s\n' "$image:slim" "$image:$version-slim"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Build and push ${{ matrix.variant }}
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=quorum-${{ matrix.variant }}
          cache-to: type=gha,scope=quorum-${{ matrix.variant }},mode=max

      - name: Sign image (keyless)
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          # Sign the (multi-arch) manifest digest once — covers every tag that
          # points at it. Keyless: identity comes from the GitHub OIDC token.
          cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Attest SLSA build provenance
        # Generates a signed SLSA v1 provenance attestation for the image and
        # pushes it to GHCR alongside the cosign signature. This records *how*
        # the image was built (workflow, commit, runner) — verifiable later.
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.meta.outputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Verify provenance attestation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ steps.meta.outputs.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          # Re-verify the just-pushed attestation end-to-end (Sigstore transparency
          # log + GitHub OIDC identity) so a broken attestation fails the release.
          gh attestation verify "oci://${IMAGE}@${DIGEST}" \
            --repo "${GITHUB_REPOSITORY}"

      - name: Summary
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          {
            echo "### Published & signed \`${{ matrix.variant }}\` image"
            echo ""
            echo "Platforms: \`${{ matrix.platforms }}\`  ·  Digest: \`${DIGEST}\`"
            echo ""
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # Native binaries for every OS/arch via GoReleaser, with checksums and a
  # keyless cosign signature. Only on tag pushes (GoReleaser needs the tag).
  binaries:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release and upload assets
      id-token: write # cosign keyless
      attestations: write # SLSA build-provenance attestations
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GoReleaser needs full history for the changelog

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest SLSA build provenance for binaries
        # One attestation covering every artifact listed in checksums.txt
        # (GoReleaser writes it in `sha256  name` format). Complements the
        # existing cosign signature over the checksum file.
        uses: actions/attest-build-provenance@v2
        with:
          subject-checksums: dist/checksums.txt

      - name: Verify binary provenance attestation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Spot-check one artifact against its just-created attestation.
          shopt -s nullglob
          artifacts=(dist/quorum_*_linux_amd64.tar.gz)
          gh attestation verify "${artifacts[0]}" --repo "${GITHUB_REPOSITORY}"
