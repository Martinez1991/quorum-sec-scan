name: release

# Builds, publishes and signs the Quorum Docker images on GitHub Container
# Registry (ghcr.io) on every `v*` tag, and on manual dispatch.
#
#   :full / :<version> / :latest   → all scanners bundled (linux/amd64 only,
#                                    the bundled scanner binaries are amd64)
#   :slim / :<version>-slim        → orchestrator only (linux/amd64 + linux/arm64)
#
# Images are signed keylessly with cosign via the GitHub OIDC identity (no keys
# to manage). Verify with:
#
#   cosign verify ghcr.io/<owner>/quorum-sec-scan:slim \
#     --certificate-identity-regexp \
#       "https://github.com/<owner>/quorum-sec-scan/.github/workflows/release.yml@.*" \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to tag the images with (e.g. 0.1.0)"
        required: true
        default: "dev"

permissions:
  contents: read
  packages: write
  id-token: write # required for cosign keyless signing (Sigstore OIDC)

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: full
            dockerfile: Dockerfile.full
            platforms: linux/amd64
          - variant: slim
            dockerfile: Dockerfile
            platforms: linux/amd64,linux/arm64
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version and image name
        id: meta
        run: |
          set -euo pipefail
          # Lowercase owner/repo for GHCR.
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${{ github.event.inputs.version }}"
          fi
          echo "image=$image"     >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

          # Build the newline-separated tag list for this variant.
          {
            echo "tags<<EOF"
            if [ "${{ matrix.variant }}" = "full" ]; then
              printf '%s\n' "$image:full" "$image:$version" "$image:$version-full" "$image:latest"
            else
              printf '%s\n' "$image:slim" "$image:$version-slim"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Build and push ${{ matrix.variant }}
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=quorum-${{ matrix.variant }}
          cache-to: type=gha,scope=quorum-${{ matrix.variant }},mode=max

      - name: Sign image (keyless)
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          # Sign the (multi-arch) manifest digest once — covers every tag that
          # points at it. Keyless: identity comes from the GitHub OIDC token.
          cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Summary
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          {
            echo "### Published & signed \`${{ matrix.variant }}\` image"
            echo ""
            echo "Platforms: \`${{ matrix.platforms }}\`  ·  Digest: \`${DIGEST}\`"
            echo ""
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
