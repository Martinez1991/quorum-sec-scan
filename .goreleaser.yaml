# GoReleaser config — builds native quorum binaries for every OS/arch, with
# checksums, archives that bundle the default crosswalk, and keyless cosign
# signatures over the checksum file. Run on a `v*` tag by .github/workflows/release.yml.
version: 2

project_name: quorum

before:
  hooks:
    - go mod download

builds:
  - id: quorum
    main: ./cmd/quorum
    binary: quorum
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: quorum
    ids: [quorum]
    name_template: "quorum_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - README.pt-BR.md
      - LICENSE
      - src: crosswalk/**/*
        dst: crosswalk

checksum:
  name_template: "checksums.txt"

# Keyless cosign signature over the checksum file (covers every artifact, since
# the checksum file pins their hashes). Requires cosign + id-token: write.
signs:
  - cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--yes"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
    artifacts: checksum
    output: true

release:
  github:
    owner: Martinez1991
    name: quorum-sec-scan
  draft: false
  prerelease: auto

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
